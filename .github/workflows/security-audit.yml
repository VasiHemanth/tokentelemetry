name: Dependency security audit

# Why this exists: issue #91 â€” vulnerable runtime deps (concurrentlyâ†’shell-quote,
# next 16.2.4) were merged because nobody ran `npm audit` before shipping the
# remote-access feature. This gate runs that check automatically on every PR and
# push, so audit regressions in any of the three npm packages fail CI instead of
# reaching main. package-lock.json is now committed for all three packages, so
# we `npm ci` (exact, reproducible install from the committed lock â€” same tree
# every user's `npm ci` resolves in bin/cli.js) instead of resolving a fresh
# tree from package.json ranges.

on:
  pull_request:
    paths:
      - "package.json"
      - "frontend/package.json"
      - "website/package.json"
      - ".github/workflows/security-audit.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "frontend/package.json"
      - "website/package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - "."          # root CLI package
          - "frontend"   # dashboard (exposed in remote mode)
          - "website"    # public marketing site (GitHub Pages)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install exact dependency tree from committed lockfile
        working-directory: ${{ matrix.package }}
        run: npm ci

      # Runtime deps are the real exposed surface â€” fail the build on any
      # high/critical there. Dev-only advisories are reported but non-blocking.
      - name: Audit runtime dependencies (blocking)
        working-directory: ${{ matrix.package }}
        run: npm audit --omit=dev --audit-level=high

      - name: Audit full tree incl. devDependencies (advisory only)
        working-directory: ${{ matrix.package }}
        run: npm audit --audit-level=high || true
