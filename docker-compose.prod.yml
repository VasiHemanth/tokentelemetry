# docker-compose.prod.yml — Production overlay: pulls pre-built images from GHCR
# instead of building locally.  Merge with compose.yml at runtime:
#
#   docker compose -f compose.yml -f docker-compose.prod.yml pull
#   docker compose -f compose.yml -f docker-compose.prod.yml up -d
#   Or via Makefile: make up-prod
#
# GHCR_OWNER  — GitHub username/org where CI published the images (default: vasihemanth)
# TT_IMAGE_TAG — pin a specific tag, e.g. sha-abc1234 (default: latest)

services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-vasihemanth}/tokentelemetry-backend:${TT_IMAGE_TAG:-latest}
    pull_policy: always

  frontend:
    image: ghcr.io/${GHCR_OWNER:-vasihemanth}/tokentelemetry-frontend:${TT_IMAGE_TAG:-latest}
    pull_policy: always
